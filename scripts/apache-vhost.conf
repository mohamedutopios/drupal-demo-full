# /etc/apache2/sites-available/drupal-crud.conf
# À activer avec : sudo a2ensite drupal-crud && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName   monsite.example.com
    ServerAlias  www.monsite.example.com
    DocumentRoot /var/www/drupal/web

    # Redirection HTTP → HTTPS (décommenter après config SSL)
    # RewriteEngine On
    # RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    <Directory /var/www/drupal/web>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/drupal-error.log
    CustomLog ${APACHE_LOG_DIR}/drupal-access.log combined
</VirtualHost>

